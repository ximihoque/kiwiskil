<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">

  <!-- Outer brown skin -->
  <circle cx="60" cy="60" r="54" fill="#6b3f1f"/>
  <!-- Inner skin -->
  <circle cx="60" cy="60" r="47" fill="#8a5230"/>
  <!-- Green flesh -->
  <circle cx="60" cy="60" r="41" fill="#4a7c3f"/>
  <!-- Lighter green -->
  <circle cx="60" cy="60" r="33" fill="#62a050"/>
  <!-- White core -->
  <circle cx="60" cy="60" r="14" fill="#f2ede0"/>
  <!-- Core inner -->
  <circle cx="60" cy="60" r="9" fill="#e4dccb"/>
  <!-- Core centre dot -->
  <circle cx="60" cy="60" r="4" fill="#cec4b0"/>

  <!-- Flesh rays -->
  <line x1="60" y1="60" x2="60" y2="19" stroke="#3d6b33" stroke-width="1.2" opacity="0.6"/>
  <line x1="60" y1="60" x2="60" y2="19" stroke="#3d6b33" stroke-width="1.2" opacity="0.6" transform="rotate(45 60 60)"/>
  <line x1="60" y1="60" x2="60" y2="19" stroke="#3d6b33" stroke-width="1.2" opacity="0.6" transform="rotate(90 60 60)"/>
  <line x1="60" y1="60" x2="60" y2="19" stroke="#3d6b33" stroke-width="1.2" opacity="0.6" transform="rotate(135 60 60)"/>
  <line x1="60" y1="60" x2="60" y2="19" stroke="#3d6b33" stroke-width="1.2" opacity="0.6" transform="rotate(180 60 60)"/>
  <line x1="60" y1="60" x2="60" y2="19" stroke="#3d6b33" stroke-width="1.2" opacity="0.6" transform="rotate(225 60 60)"/>
  <line x1="60" y1="60" x2="60" y2="19" stroke="#3d6b33" stroke-width="1.2" opacity="0.6" transform="rotate(270 60 60)"/>
  <line x1="60" y1="60" x2="60" y2="19" stroke="#3d6b33" stroke-width="1.2" opacity="0.6" transform="rotate(315 60 60)"/>

  <!-- Seeds at radius ~28 -->
  <ellipse cx="60" cy="33" rx="3.2" ry="5" fill="#1e1008" transform="rotate(0 60 60)"/>
  <ellipse cx="60" cy="33" rx="3.2" ry="5" fill="#1e1008" transform="rotate(45 60 60)"/>
  <ellipse cx="60" cy="33" rx="3.2" ry="5" fill="#1e1008" transform="rotate(90 60 60)"/>
  <ellipse cx="60" cy="33" rx="3.2" ry="5" fill="#1e1008" transform="rotate(135 60 60)"/>
  <ellipse cx="60" cy="33" rx="3.2" ry="5" fill="#1e1008" transform="rotate(180 60 60)"/>
  <ellipse cx="60" cy="33" rx="3.2" ry="5" fill="#1e1008" transform="rotate(225 60 60)"/>
  <ellipse cx="60" cy="33" rx="3.2" ry="5" fill="#1e1008" transform="rotate(270 60 60)"/>
  <ellipse cx="60" cy="33" rx="3.2" ry="5" fill="#1e1008" transform="rotate(315 60 60)"/>

</svg>
